<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>escribir — jasachz</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF8;--surface:#FFFFFF;--border:#E8E5DF;
  --text:#1A1816;--text2:#5C5750;--text3:#9B958C;
  --accent:#16140F;--ok:#15803D;--err:#B3261B;
  --serif:'Source Serif 4',Georgia,serif;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans)}
.wrap{max-width:1100px;margin:0 auto;padding:40px 24px 100px}
.header-bar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
@media (max-width:860px){.editor-grid{grid-template-columns:1fr}}
h1{font-family:var(--serif);font-weight:500;font-size:28px;margin-bottom:6px}
.sub{font-family:var(--mono);font-size:12px;color:var(--text3)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
.card h2{font-family:var(--sans);font-size:14px;font-weight:600;margin-bottom:14px}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px}
.field input,.field textarea{width:100%;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;padding:10px 12px;border-radius:8px;resize:vertical}
.field textarea{font-family:var(--serif);font-size:16px;line-height:1.6}
.hint{font-family:var(--sans);font-size:12px;color:var(--text3);margin-top:6px}
.row{display:flex;gap:10px;align-items:center}
.row input{flex:1}
button{border:none;font-family:var(--sans);font-weight:600;font-size:14px;padding:11px 18px;border-radius:9px;cursor:pointer}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-primary:disabled{opacity:.5;cursor:default}
.status{font-family:var(--mono);font-size:13px;margin-top:14px;padding:10px 12px;border-radius:8px}
.status.ok{background:rgba(21,128,61,0.1);color:var(--ok)}
.status.err{background:rgba(179,38,27,0.1);color:var(--err)}
.token-note{font-family:var(--sans);font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:14px}
a.back{display:inline-block;margin-bottom:24px;font-family:var(--mono);font-size:13px;color:var(--text2)}
.token-wrap{position:relative;flex:0 0 auto}
.token-btn{white-space:nowrap;font-size:13px;padding:9px 16px;border-radius:20px}
.token-popover{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;width:300px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:20}
@media (max-width:480px){.token-popover{right:auto;left:0;width:min(300px,80vw)}}
.entry-item{border-top:1px solid var(--border);padding:14px 0}
.entry-item:first-child{border-top:none}
.entry-item .meta{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:4px}
.entry-item .excerpt{font-family:var(--serif);font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.entry-item .actions{display:flex;gap:8px}
.entry-item .actions button{padding:7px 13px;font-size:13px}
.btn-danger{background:transparent;border:1px solid rgba(179,38,27,.3);color:var(--err)}
.empty-note{font-family:var(--sans);font-size:13px;color:var(--text3)}
.editing-banner{font-family:var(--sans);font-size:13px;background:rgba(26,24,22,.05);border-radius:8px;padding:10px 12px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.editing-banner button{background:transparent;border:1px solid var(--border);color:var(--text);padding:6px 12px;font-size:12px}
@media (max-width:480px){
  .wrap{padding:24px 16px 80px}
  .card{padding:18px}
  h1{font-size:24px}
  .header-bar{gap:12px}
  .field textarea[rows="12"]{min-height:50vh}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script>
const{useState,useEffect}=React;
const h=React.createElement;

const OWNER='tny-me',REPO='nuxiens.org',BRANCH='main',PATH='entries.json';
const API='https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+PATH;

function b64EncodeUnicode(str){
  const bytes=new TextEncoder().encode(str);
  let bin='';
  bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin);
}
function b64DecodeUnicode(str){
  const bin=atob(str);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function todayISO(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function esDateFromISO(iso){
  const[y,m,dd]=iso.split('-').map(Number);
  return dd+' de '+MESES[m-1]+', '+y;
}

function App(){
  const[token,setToken]=useState('');
  const[showToken,setShowToken]=useState(false);
  const[tokenOpen,setTokenOpen]=useState(false);
  const[dateISO,setDateISO]=useState(todayISO());
  const[excerpt,setExcerpt]=useState('');
  const[body,setBody]=useState('');
  const[quote,setQuote]=useState('');
  const[busy,setBusy]=useState(false);
  const[status,setStatus]=useState(null);
  const[entries,setEntries]=useState([]);
  const[loadingList,setLoadingList]=useState(true);
  const[editingId,setEditingId]=useState(null);

  useEffect(()=>{
    const saved=localStorage.getItem('nx-gh-token');
    if(saved)setToken(saved);
  },[]);

  const saveToken=v=>{setToken(v);localStorage.setItem('nx-gh-token',v);};
  const clearToken=()=>{setToken('');localStorage.removeItem('nx-gh-token');};

  const loadEntries=async()=>{
    setLoadingList(true);
    try{
      const res=await fetch(API+'?ref='+BRANCH);
      if(!res.ok)return;
      const data=await res.json();
      const list=JSON.parse(b64DecodeUnicode(data.content.replace(/\n/g,'')));
      setEntries([...list].sort((a,b)=>b.id-a.id));
    }catch(e){}finally{
      setLoadingList(false);
    }
  };
  useEffect(()=>{loadEntries();},[]);

  const resetForm=()=>{
    setEditingId(null);setExcerpt('');setBody('');setQuote('');setDateISO(todayISO());
  };

  const startEdit=entry=>{
    setEditingId(entry.id);
    setDateISO(entry.dateISO||todayISO());
    setExcerpt(entry.excerpt||'');
    setBody(entry.body||'');
    setQuote(entry.quote||'');
    setStatus(null);
    window.scrollTo({top:0,behavior:'smooth'});
  };

  const publish=async()=>{
    if(!token){setStatus({type:'err',msg:'Falta el token de GitHub.'});return;}
    if(!body.trim()){setStatus({type:'err',msg:'Falta el texto.'});return;}
    setBusy(true);setStatus(null);
    try{
      const headers={
        'Authorization':'Bearer '+token,
        'Accept':'application/vnd.github+json'
      };
      const getRes=await fetch(API+'?ref='+BRANCH,{headers});
      if(!getRes.ok)throw new Error('No se pudo leer entries.json ('+getRes.status+')');
      const getData=await getRes.json();
      const current=JSON.parse(b64DecodeUnicode(getData.content.replace(/\n/g,'')));
      const iso=dateISO||todayISO();
      const fields={
        date:esDateFromISO(iso),
        dateISO:iso,
        excerpt:excerpt.trim()||body.trim().split('\n\n')[0].slice(0,200),
        body:body.trim(),
        quote:quote.trim()||excerpt.trim()||body.trim().split('\n\n')[0]
      };
      let updated,message;
      if(editingId){
        updated=current.map(e=>e.id===editingId?{...e,...fields}:e);
        message='Edit entry #'+editingId;
      }else{
        const nextId=current.reduce((m,e)=>Math.max(m,e.id||0),0)+1;
        updated=[...current,{id:nextId,...fields}];
        message='Add entry #'+nextId;
      }
      const content=b64EncodeUnicode(JSON.stringify(updated,null,2));
      const putRes=await fetch(API,{
        method:'PUT',
        headers:{...headers,'Content-Type':'application/json'},
        body:JSON.stringify({
          message,
          content,
          sha:getData.sha,
          branch:BRANCH
        })
      });
      if(!putRes.ok){
        const err=await putRes.json().catch(()=>({}));
        throw new Error(err.message||('Error al publicar ('+putRes.status+')'));
      }
      setStatus({type:'ok',msg:editingId?'Cambios guardados. El sitio se actualizará en uno o dos minutos.':'Publicado. El sitio se actualizará en uno o dos minutos.'});
      setEntries([...updated].sort((a,b)=>b.id-a.id));
      resetForm();
    }catch(e){
      setStatus({type:'err',msg:e.message||'Error desconocido.'});
    }finally{
      setBusy(false);
    }
  };

  const removeEntry=async entry=>{
    if(!token){setStatus({type:'err',msg:'Falta el token de GitHub.'});return;}
    if(!window.confirm('¿Borrar esta entrada? Esta acción no se puede deshacer.'))return;
    setBusy(true);setStatus(null);
    try{
      const headers={
        'Authorization':'Bearer '+token,
        'Accept':'application/vnd.github+json'
      };
      const getRes=await fetch(API+'?ref='+BRANCH,{headers});
      if(!getRes.ok)throw new Error('No se pudo leer entries.json ('+getRes.status+')');
      const getData=await getRes.json();
      const current=JSON.parse(b64DecodeUnicode(getData.content.replace(/\n/g,'')));
      const updated=current.filter(e=>e.id!==entry.id);
      const content=b64EncodeUnicode(JSON.stringify(updated,null,2));
      const putRes=await fetch(API,{
        method:'PUT',
        headers:{...headers,'Content-Type':'application/json'},
        body:JSON.stringify({
          message:'Delete entry #'+entry.id,
          content,
          sha:getData.sha,
          branch:BRANCH
        })
      });
      if(!putRes.ok){
        const err=await putRes.json().catch(()=>({}));
        throw new Error(err.message||('Error al borrar ('+putRes.status+')'));
      }
      setStatus({type:'ok',msg:'Entrada borrada. El sitio se actualizará en uno o dos minutos.'});
      setEntries([...updated].sort((a,b)=>b.id-a.id));
      if(editingId===entry.id)resetForm();
    }catch(e){
      setStatus({type:'err',msg:e.message||'Error desconocido.'});
    }finally{
      setBusy(false);
    }
  };

  return h('div',{className:'wrap'},
    h('div',{className:'header-bar'},
      h('div',{},
        h('a',{className:'back',href:'/'},'← volver al sitio'),
        h('h1',{},'Escribir'),
        h('div',{className:'sub'},'publica directo en jasachz.com · @jasachz')
      ),
      h('div',{className:'token-wrap'},
        h('button',{
          className:'btn-secondary token-btn',
          onClick:()=>setTokenOpen(!tokenOpen)
        },token?'🔑 Conectado':'🔑 Token'),
        tokenOpen&&h('div',{className:'token-popover'},
          h('div',{className:'token-note'},
            'Necesitas un Personal Access Token (classic) con permiso ',
            h('code',{},'repo'),
            ' de tu cuenta de GitHub. Se guarda solo en este navegador (localStorage), nunca se sube al repositorio.'
          ),
          h('div',{className:'row'},
            h('input',{
              type:showToken?'text':'password',
              placeholder:'ghp_xxxxxxxxxxxxxxxx',
              value:token,
              onChange:e=>saveToken(e.target.value)
            })
          ),
          h('div',{className:'row',style:{marginTop:10}},
            h('button',{className:'btn-secondary',onClick:()=>setShowToken(!showToken)},showToken?'Ocultar':'Ver'),
            h('button',{className:'btn-secondary',onClick:clearToken},'Borrar'),
            h('button',{className:'btn-secondary',onClick:()=>setTokenOpen(false)},'Listo')
          )
        )
      )
    ),

    h('div',{className:'editor-grid'},
      h('div',{className:'card'},
        h('h2',{},editingId?'Editar entrada #'+editingId:'Nueva lectura'),
        editingId&&h('div',{className:'editing-banner'},
          h('span',{},'Editando la entrada #'+editingId+'.'),
          h('button',{onClick:resetForm},'Cancelar')
        ),
        h('div',{className:'field'},
          h('label',{},'Texto completo'),
          h('textarea',{rows:12,value:body,onChange:e=>setBody(e.target.value)}),
          h('div',{className:'hint'},'Separa los párrafos con una línea vacía — cada párrafo se vuelve una imagen del carrusel.')
        ),
        h('div',{className:'row'},
          h('button',{className:'btn-primary',disabled:busy,onClick:publish},busy?(editingId?'Guardando…':'Publicando…'):(editingId?'Guardar cambios':'Publicar')),
          editingId&&h('button',{className:'btn-secondary',disabled:busy,onClick:resetForm},'Cancelar')
        ),
        status&&h('div',{className:'status '+status.type},status.msg)
      ),

      h('div',{className:'card'},
        h('h2',{},'Entradas publicadas'),
        loadingList&&h('div',{className:'empty-note'},'Cargando…'),
        !loadingList&&!entries.length&&h('div',{className:'empty-note'},'Todavía no hay entradas.'),
        !loadingList&&entries.map(entry=>h('div',{key:entry.id,className:'entry-item'},
          h('div',{className:'meta'},'#'+entry.id),
          h('div',{className:'excerpt'},entry.excerpt||(entry.body||'').slice(0,160)),
          h('div',{className:'actions'},
            h('button',{className:'btn-secondary',disabled:busy,onClick:()=>startEdit(entry)},'Editar'),
            h('button',{className:'btn-danger',disabled:busy,onClick:()=>removeEntry(entry)},'Borrar')
          )
        ))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
