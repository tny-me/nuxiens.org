<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F8F5EE;--surface:#FFFEFB;--border:#E2DCCB;
  --text:#211E18;--text2:#5A5444;--text3:#9C9480;
  --accent:#7A3B32;

[data-dark="1"]{

}

.nx-field textarea,.nx-field input{width:100%;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;padding:10px 12px;border-radius:8px;resize:vertical}

.nx-slidenav button:disabled{opacity:.3;cursor:default}
.nx-slidenav span{font-family:var(--mono);font-size:12px;color:var(--text3)}
.nx-carousel-note{font-family:var(--sans);font-size:13px;color:var(--text2);line-height:1.5;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px}
@media (max-width:480px){
  .nx-entry{flex-direction:column;gap:6px;padding:20px 0}
  .nx-entry-code{width:auto}

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
const{useState,useRef,useMemo,useEffect}=React;
const h=React.createElement;

const ENTRIES_FALLBACK=[
  {
    id:1,
    title:'Bienvenida',
    date:'23 de junio, 2026',
    excerpt:'Un espacio personal de escritura — ideas, observaciones y reflexiones sobre tecnología y pensamiento, sin agenda editorial.',
    body:`Este espacio existe para lo que yo mismo tengo que decir.

No hay aquí una promesa de frecuencia ni de tema fijo. Habrá tecnología, pero también habrá ideas que no caben en ninguna categoría — observaciones sobre cómo pensamos, cómo construimos, cómo decidimos.

Cada texto que publique aquí podrá convertirse en una imagen para compartir. La intención no es la viralidad, sino que una idea, si vale la pena, pueda viajar más allá de esta página.`,
    quote:'Este espacio existe ahora para lo que yo mismo tengo que decir.'
  }
];

function getLines(ctx,text,maxW,max){
  const words=text.split(' ');
  let line='',lines=[];
  for(let i=0;i<words.length;i++){
    const test=line+words[i]+' ';
    if(ctx.measureText(test).width>maxW&&line){
      if(max&&lines.length>=max-1){lines.push(line.trim()+'…');return lines;}
      lines.push(line.trim());line=words[i]+' ';
    }else{
      line=test;
    }
  }
  if(line)lines.push(line.trim());
  return lines;
}

function slugify(text){
  return (text||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40)||'fragmento';
}

const PALETTE=['#16140F','#1B2A4A','#4A4842','#9C968C'];

const FORMATS=[
  {id:'post',label:'Publicación',w:1080,h:1080},
  {id:'historia',label:'Historia',w:1080,h:1920},
  {id:'reel',label:'Reel / TikTok',w:1080,h:1920}
];

function trackedText(s){
  return (s||'').toUpperCase().split('').join(' ');
}

function fitQuote(c,text,W,H,withCode){
  const fontStack='-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,sans-serif';
  const maxFont=Math.round(W*0.024),minFont=Math.round(W*0.013);
  const maxW=Math.round(W*0.62);
  let footer=Math.round(W*0.022)+Math.round(W*0.03)+Math.round(W*0.014*1.3);
  if(withCode)footer+=Math.round(W*0.012)+Math.round(W*0.012*1.3);
  const safeH=Math.max(minFont*1.45,H-Math.round(W*0.34)-footer);
  let fontSize=maxFont,lines,lh,blockH;
  for(;fontSize>=minFont;fontSize--){
    c.font='400 '+fontSize+'px '+fontStack;
    lh=Math.round(fontSize*1.45);
    lines=getLines(c,text,maxW,200);
    blockH=lines.length*lh;
    if(blockH<=safeH)break;
  }
  if(blockH>safeH){
    fontSize=minFont;
    c.font='400 '+fontSize+'px '+fontStack;
    lh=Math.round(fontSize*1.45);
    const maxLines=Math.max(1,Math.floor(safeH/lh));
    lines=getLines(c,text,maxW,maxLines);
    blockH=lines.length*lh;
  }
  return{fontSize,lines,lh,blockH,maxW,fontStack,footer};
}

const BG_THEMES=[
  {id:'dark',label:'Negro',bgA:'#000000',bgB:'#111114',fg:'#F5F5F7',fgMuted:'rgba(245,245,247,0.45)'},
  {id:'light',label:'Blanco',bgA:'#FFFFFF',bgB:'#F4F3F0',fg:'#1D1D1F',fgMuted:'rgba(29,29,31,0.45)'},
  {id:'gray',label:'Gris',bgA:'#F2F1EE',bgB:'#E3E1DB',fg:'#1D1D1F',fgMuted:'rgba(29,29,31,0.45)'},
  {id:'blue',label:'Azul',bgA:'#EEF3F8',bgB:'#DCE6F0',fg:'#19222E',fgMuted:'rgba(25,34,46,0.45)'},
  {id:'green',label:'Verde',bgA:'#EEF4EE',bgB:'#DCE9DC',fg:'#1A2A1E',fgMuted:'rgba(26,42,30,0.45)'}
];

function renderSlide(c,W,H,{text,author,accent,bg,index,total,code}){
  const theme=BG_THEMES.find(t=>t.id===bg)||BG_THEMES[0];
  const{bgA,bgB,fg,fgMuted}=theme;

  const grad=c.createRadialGradient(W/2,H*0.42,W*0.08,W/2,H*0.5,W*0.8);
  grad.addColorStop(0,bgB);
  grad.addColorStop(1,bgA);
  c.fillStyle=grad;c.fillRect(0,0,W,H);
  c.textBaseline='alphabetic';

  const{fontSize,lines,lh,blockH,fontStack,footer}=fitQuote(c,text,W,H,!!code);
  const totalH=blockH+footer;
  const startY=Math.round(H/2-totalH/2+lh*0.3);

  c.font='400 '+fontSize+'px '+fontStack;
  try{c.letterSpacing='-0.3px';}catch(e){}
  c.fillStyle=fg;c.textAlign='center';
  lines.forEach((ln,i)=>c.fillText(ln,W/2,startY+i*lh));
  try{c.letterSpacing='0px';}catch(e){}

  const lineY=startY+blockH+Math.round(W*0.022);
  c.strokeStyle=accent;c.lineWidth=Math.max(1,Math.round(W*0.0014));
  c.beginPath();c.moveTo(W/2-Math.round(W*0.022),lineY);c.lineTo(W/2+Math.round(W*0.022),lineY);c.stroke();

  c.font='500 '+Math.round(W*0.014)+'px Inter,sans-serif';
  c.fillStyle=fgMuted;c.textAlign='center';
  const authorY=lineY+Math.round(W*0.03);
  c.fillText(trackedText(author||'jasachz'),W/2,authorY);

  if(code){
    c.font='500 '+Math.round(W*0.012)+'px "JetBrains Mono",monospace';
    c.fillStyle=fgMuted;c.textAlign='center';
    c.fillText(code,W/2,authorY+Math.round(W*0.012)+Math.round(W*0.012*1.3));
  }

  if(total>1){
    c.font='500 '+Math.round(W*0.013)+'px "JetBrains Mono",monospace';
    c.fillStyle=fgMuted;c.textAlign='right';
    c.fillText(
      String(index+1).padStart(2,'0')+' / '+String(total).padStart(2,'0'),
      W-Math.round(W*0.07),Math.round(H*0.06)+Math.round(W*0.013)
    );
  }
}

function renderQuoteImage(canvas,{text,author,accent,bg,format,index,total,code}){
  const f=FORMATS.find(x=>x.id===format)||FORMATS[0];
  canvas.width=f.w;canvas.height=f.h;
  const c=canvas.getContext('2d');
  renderSlide(c,f.w,f.h,{text,author,accent,bg,index:index||0,total:total||1,code});
}

function shortDate(dateISO){
  if(!dateISO)return'';
  const[y,m,d]=dateISO.split('-');
  return d+'.'+m+'.'+y.slice(2);
}
function entryCode(entry){
  if(!entry||!entry.dateISO)return'';
  return String(entry.id).padStart(2,'0')+':'+shortDate(entry.dateISO);
}

async function renderToBlob(opts){
  const canvas=document.createElement('canvas');
  renderQuoteImage(canvas,opts);
  return new Promise(resolve=>canvas.toBlob(resolve,'image/png'));
}

function ShareStudio({entry,onClose}){
  const fragments=useMemo(()=>entry.body.split('\n\n').filter(Boolean),[entry]);
  const[mode,setMode]=useState('fragmento');
  const[quote,setQuote]=useState(entry.quote||entry.excerpt);
  const[slide,setSlide]=useState(0);
  const[author,setAuthor]=useState('jasachz');
  const[accent,setAccent]=useState(PALETTE[0]);
  const[bg,setBg]=useState('dark');
  const[format,setFormat]=useState('post');
  const[busy,setBusy]=useState(false);
  const canvasRef=useRef(null);

  const currentText=mode==='carrusel'?fragments[slide]:quote;
  const code=useMemo(()=>entryCode(entry),[entry]);

  useEffect(()=>{
    if(canvasRef.current)renderQuoteImage(canvasRef.current,{
      text:currentText,author,accent,bg,format,code,
      index:mode==='carrusel'?slide:0,total:mode==='carrusel'?fragments.length:1
    });
  },[currentText,author,accent,bg,format,mode,slide,code]);

  const filename=(i,n)=>slugify(currentText)+(n>1?'-'+String(i+1).padStart(2,'0'):'')+'.png';

  const download=async()=>{
    const blob=await renderToBlob({text:currentText,author,accent,bg,format,code,index:slide,total:mode==='carrusel'?fragments.length:1});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=filename(slide,1);
    document.body.appendChild(a);a.click();a.remove();
    URL.revokeObjectURL(url);
  };

  const share=async()=>{
    const blob=await renderToBlob({text:currentText,author,accent,bg,format,code,index:slide,total:mode==='carrusel'?fragments.length:1});
    const file=new File([blob],filename(slide,1),{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],text:currentText});}catch(e){}
    }else{
      download();
    }
  };

  const downloadCarousel=async()=>{
    setBusy(true);
    try{
      const zip=new JSZip();
      for(let i=0;i<fragments.length;i++){
        const blob=await renderToBlob({text:fragments[i],author,accent,bg,format,code,index:i,total:fragments.length});
        zip.file(filename(i,fragments.length),blob);
      }
      const zipBlob=await zip.generateAsync({type:'blob'});
      const url=URL.createObjectURL(zipBlob);
      const a=document.createElement('a');
      a.href=url;a.download=slugify(entry.title)+'-carrusel.zip';
      document.body.appendChild(a);a.click();a.remove();
      URL.revokeObjectURL(url);
    }finally{
      setBusy(false);
    }
  };

  const shareCarousel=async()=>{
    setBusy(true);
    try{
      const files=[];
      for(let i=0;i<fragments.length;i++){
        const blob=await renderToBlob({text:fragments[i],author,accent,bg,format,code,index:i,total:fragments.length});
        files.push(new File([blob],filename(i,fragments.length),{type:'image/png'}));
      }
      if(navigator.canShare&&navigator.canShare({files})){
        try{await navigator.share({files});}catch(e){}
      }else{
        await downloadCarousel();
      }
    }finally{
      setBusy(false);
    }
  };

  return h('div',{className:'nx-studio-overlay',onClick:onClose},
    h('div',{className:'nx-studio',onClick:e=>e.stopPropagation()},
      h('button',{className:'nx-close',onClick:onClose},'×'),
      h('div',{className:'nx-studio-preview'},
        h('canvas',{ref:canvasRef}),
        mode==='carrusel'&&fragments.length>1&&h('div',{className:'nx-slidenav'},
          h('button',{disabled:slide===0,onClick:()=>setSlide(s=>Math.max(0,s-1))},'‹'),
          h('span',{},(slide+1)+' / '+fragments.length),
          h('button',{disabled:slide===fragments.length-1,onClick:()=>setSlide(s=>Math.min(fragments.length-1,s+1))},'›')
        )
      ),
      h('div',{className:'nx-studio-form'},
        h('h3',{},'Crear imagen'),
        h('div',{className:'nx-field'},
          h('label',{},'Modo'),
          h('div',{className:'nx-bgrow'},
            h('button',{className:'nx-bgbtn'+(mode==='fragmento'?' active':''),onClick:()=>setMode('fragmento')},'Un fragmento'),
            h('button',{className:'nx-bgbtn'+(mode==='carrusel'?' active':''),onClick:()=>{setMode('carrusel');setSlide(0);}},'Carrusel ('+fragments.length+')')
          )
        ),
        h('div',{className:'nx-field'},
          h('label',{},'Formato'),
          h('div',{className:'nx-bgrow'},
            FORMATS.map(f=>h('button',{
              key:f.id,
              className:'nx-bgbtn'+(format===f.id?' active':''),
              onClick:()=>setFormat(f.id)
            },f.label))
          )
        ),
        mode==='fragmento'
          ?h('div',{className:'nx-field'},
              h('label',{},'Texto / fragmento'),
              h('textarea',{rows:4,value:quote,onChange:e=>setQuote(e.target.value)})
            )
          :h('div',{className:'nx-field'},
              h('label',{},'Texto'),
              h('div',{className:'nx-carousel-note'},'Se generará una imagen por cada párrafo del texto, lista para subir como carrusel.')
            ),
        h('div',{className:'nx-field'},
          h('label',{},'Firma'),
          h('input',{value:author,onChange:e=>setAuthor(e.target.value)})
        ),
        h('div',{className:'nx-field'},
          h('label',{},'Color de acento'),
          h('div',{className:'nx-swatches'},
            PALETTE.map(p=>h('div',{
              key:p,
              className:'nx-swatch'+(accent===p?' active':''),
              style:{background:p},
              onClick:()=>setAccent(p)
            }))
          )
        ),
        h('div',{className:'nx-bgrow'},
          BG_THEMES.map(t=>h('button',{
            key:t.id,
            className:'nx-bgbtn'+(bg===t.id?' active':''),
            onClick:()=>setBg(t.id)
          },t.label))
        ),
        mode==='fragmento'
          ?h('div',{className:'nx-studio-actions'},
              h('button',{className:'nx-btn-secondary',onClick:download},'Descargar'),
              h('button',{className:'nx-btn-primary',onClick:share},'Compartir')
            )
          :h('div',{className:'nx-studio-actions'},
              h('button',{className:'nx-btn-secondary',disabled:busy,onClick:downloadCarousel},busy?'Generando…':'Descargar .zip'),
              h('button',{className:'nx-btn-primary',disabled:busy,onClick:shareCarousel},busy?'Generando…':'Compartir todo')
            )
      )
    )
  );
}

function App(){
  const[dark,setDark]=useState(false);
  const[studioEntry,setStudioEntry]=useState(null);
  const[entries,setEntries]=useState(ENTRIES_FALLBACK);

  useEffect(()=>{
    fetch('./entries.json?_='+Date.now())
      .then(r=>r.ok?r.json():Promise.reject())
      .then(data=>{if(Array.isArray(data)&&data.length)setEntries(data);})
      .catch(()=>{});
  },[]);

  useEffect(()=>{
    const saved=localStorage.getItem('nx-dark');
    if(saved==='1')setDark(true);
  },[]);
  useEffect(()=>{
    localStorage.setItem('nx-dark',dark?'1':'');
  },[dark]);

  const sorted=useMemo(()=>[...entries].sort((a,b)=>b.id-a.id),[entries]);

  return h('div',{className:'nx-app','data-dark':dark?'1':undefined},
    h('nav',{className:'nx-nav'},
      h('div',{className:'nx-logo'},'jasachz',h('span',{},'·escritos')),
      h('button',{className:'nx-toggle',onClick:()=>setDark(!dark)},dark?'☀':'☾')
    ),
    h('div',{className:'nx-hero'},
      h('div',{className:'nx-eyebrow'},'escritos personales')
    ),
    h('ul',{className:'nx-list'},
      sorted.map(entry=>h('li',{key:entry.id,className:'nx-entry'},
        h('div',{className:'nx-entry-code'},entryCode(entry)||entry.date),
        h('div',{className:'nx-entry-body'},
          h('h2',{},entry.title),
          h('div',{className:'nx-entry-text'},
            entry.body.split('\n\n').filter(Boolean).map((p,i)=>h('p',{key:i},p))
          ),
          h('div',{className:'nx-entry-actions'},
            h('button',{className:'nx-entry-share',onClick:()=>setStudioEntry(entry)},'✦ Generar imágenes')
          )
        )
      ))
    ),
    h('footer',{},
      h('span',{},'@jasachz'),
      h('span',{},'© 2026')
    ),
    studioEntry&&h(ShareStudio,{entry:studioEntry,onClose:()=>setStudioEntry(null)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
