  {
    id:7,
    title:'Nuxiens tuvo un desafío técnico con la síntesis.',
    date:'23 de diciembre, 2025',
    excerpt:'Santa se nos adelantó. Nuxiens enfrenta un problema sistémico que afecta a casi toda plataforma. Al intentar integrar flujos multidisciplinarios, el sistema comenzó a comportarse como un simple agregador.',
    body:'Santa se nos adelantó. Nuxiens enfrenta un problema sistémico que afecta a casi toda plataforma. Al intentar integrar flujos multidisciplinarios, el sistema comenzó a comportarse como un simple agregador, acumulando información de alto valor pero perdiendo la capacidad de generar conexiones significativas. La entropía estaba ganando la batalla; teníamos los ladrillos, pero carecíamos de la estructura para construir el edificio.\n\nEn lugar de permitir una acumulación lineal, decidimos implementar un motor de jerarquía basado en la relevancia lógica y no en la cronología. Diseñamos un "algoritmo de decaimiento cognitivo" que identifica nodos de información aislados y exige al usuario (o al curador) establecer al menos tres conexiones transversales para que el dato sea validado en la red principal.\n\nEste cambio de paradigma transformó a Nuxiens de un repositorio pasivo a una infraestructura activa. Al forzar la síntesis desde la entrada del dato, logramos que la plataforma no solo almacene, sino que obligue a la mente a estructurar. La solución no fue más almacenamiento, sino una lógica de filtrado más severa: si una idea no puede conectarse jerárquicamente con otras disciplinas, es ruido y se descarta del ecosistema principal de la plataforma.',

    body:'El despliegue de la versión alfa de nuxiens.org ha confirmado la viabilidad de su modelo de datos. Los primeros flujos de información multidisciplinaria han demostrado una capacidad de auto-organización dentro de nuestra jerarquía de nodos. El sistema no solo almacena; categoriza y sugiere conexiones lógicas que antes eran invisibles para el analista promedio.\n\nEsta fase de prueba ha validado que existe una demanda crítica por plataformas que respeten el tiempo y la capacidad intelectual del usuario. Nuxiens está demostrando ser un activo indispensable para quienes buscan transformar datos brutos en una ventaja competitiva, manteniendo una solidez técnica que garantiza la escalabilidad del conocimiento.',
    url:null

    title:'Interactuando con la Precisión',

    excerpt:'nuxiens.org revela hoy los pilares de su interfaz de usuario. En una desviación radical de las tendencias visuales saturadas, Nuxiens adopta un diseño más simple.',
    body:'nuxiens.org revela hoy los pilares de su interfaz de usuario. En una desviación radical de las tendencias visuales saturadas, Nuxiens adopta un diseño más simple. La estética del proyecto es una consecuencia directa de su funcionalidad: sobria, monocromática y estrictamente enfocada en la reducción del ruido visual.\n\nInspirados en los estándares de las herramientas de productividad más sofisticadas del mundo, hemos eliminado cualquier elemento que no cumpla una función cognitiva. La sofisticación de Nuxiens radica en su simplicidad; una interfaz que no compite con el pensamiento del usuario, sino que le proporciona el lienzo técnico necesario para el trabajo profundo y la síntesis intelectual.',

    body:'El desarrollo técnico de nuxiens.org entra en su fase de diseño de protocolos. Aplicando principios avanzados de ingeniería de sistemas, la plataforma está siendo construida bajo la premisa de "Infraestructura Cognitiva". El valor de un sistema no reside en sus componentes individuales, sino en la eficiencia de sus conexiones.\n\nEstamos estableciendo estándares de curaduría que eliminan la fricción entre la curiosidad y la asimilación. Cada módulo de Nuxiens debe responder a un criterio de utilidad y verificabilidad. La ingeniería industrial nos enseña que la optimización es la eliminación de lo innecesario; bajo esa misma lógica, Nuxiens operará como un filtro de alta precisión diseñado para mentes que exigen claridad sobre el caos.',

    body:'Tras una fase intensiva de conceptualización, se define la identidad técnica de nuxiens.org. Más que un repositorio o una plataforma open access, Nuxiens se posiciona como un referente para Latinoamérica, brindando contenido intelectual de valor, que es valorado por una gran comunidad de emprendedores, profesores, investigadores y curiosos incansables. El nombre, derivado de la raíz Nux (núcleo) y la esencia del entendimiento sistémico, refleja un compromiso con el rigor y la síntesis.\n\nEl proyecto rechaza los flujos algorítmicos lineales que fomentan el consumo pasivo. En su lugar, la arquitectura de Nuxiens se basará en nodos de conocimiento interconectados mediante jerarquías lógicas. Se actualiza al instante atrayendo información de fuentes confiables y en tendencia. Este enfoque permite que cada pieza de información sea un activo estratégico dentro de un ecosistema mayor, garantizando que la profundidad nunca sea sacrificada en favor de la inmediatez. Y sea contenido que aporte curiosidad y valor.',

function BlogPost({post,rank}){
  const[open,setOpen]=useState(false);
  const paragraphs=(post.body||'').split('\n\n').filter(Boolean);
  return h('li',{className:'nx-item',style:{display:'grid',gridTemplateColumns:'44px 1fr'}},
    h('div',{className:'nx-rank'},rank),
    h('div',{className:'nx-body-col'},
      h('div',{className:'nx-title-row'},
        h('span',{className:'nx-ttl',style:{cursor:'pointer'},onClick:()=>setOpen(o=>!o)},post.title),
        h('span',{className:'nx-domain'},post.date)
      ),
      h('p',{className:'nx-ttl-translated',style:{display:'block',marginTop:4}},post.excerpt),
      open&&paragraphs.length>0&&h('div',{style:{marginTop:12,borderTop:'1px solid var(--border)',paddingTop:12}},
        ...paragraphs.map((p,i)=>h('p',{key:i,style:{fontSize:13,color:'var(--text2)',lineHeight:1.75,marginTop:i>0?12:0}},p)),
        h('p',{style:{fontSize:13,color:'var(--text3)',lineHeight:1.75,marginTop:16,fontStyle:'italic'}},'— El equipo de Nuxiens.')
      ),
      h('div',{className:'nx-meta',style:{marginTop:6}},
        h('span',{style:{cursor:'pointer',color:'var(--accent)',fontFamily:'var(--mono)',fontSize:10},onClick:()=>setOpen(o=>!o)},
          open?'cerrar ↑':'leer más ↓'
        )
      )
    )
  );
}

function getTags(title){
  if(!title)return[];
  const low=title.toLowerCase();
  return TAGS.filter(r=>r.kw.some(k=>low.includes(k))).map(r=>r.tag);
}
function ago(ts){const s=Math.floor(Date.now()/1000-ts);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
function dom(url){if(!url)return null;try{return new URL(url).hostname.replace(/^www\./,'');}catch{return null;}}
function fmtCd(s){return s>=60?`${Math.floor(s/60)}m ${s%60}s`:`${s}s`;}

const GT_LANG={zh:'zh-CN',pt:'pt',ja:'ja',fr:'fr',de:'de',es:'es'};
async function translateBatch(titles,lang){
  if(lang==='en')return titles;
  const tl=GT_LANG[lang]||lang;
  try{
    const results=await Promise.all(
      titles.map(q=>
        fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${tl}&dt=t&q=${encodeURIComponent(q)}`)
          .then(r=>r.json())
          .then(d=>d[0]?d[0].map(s=>s[0]).join(''):q)
          .catch(()=>q)
      )
    );
    return results;
  }catch(e){return null;}
}

function TagPill({tag,active,onClick,dark}){
  const r=TAGS.find(t=>t.tag===tag);
  if(!r)return null;
  const bg=active?r.color:(dark?r.dbg:r.bg);
  const color=active?'#fff':r.color;
  const border=active?r.color:r.color+'44';
  return h('span',{className:'nx-tag',style:{background:bg,color,borderColor:border},
    onClick:onClick?e=>{e.stopPropagation();onClick(tag);}:undefined},tag);
}

function Row({item,rank,isNew,translation,onTagClick,dark,lang}){
  const[pts,setPts]=useState(item.score||0);
  const[voted,setVoted]=useState(false);
  const d=dom(item.url);
  const tags=useMemo(()=>getTags(item.title),[item.title]);
  const commentsUrl=`https://news.ycombinator.com/item?id=${item.id}`;
  const articleHref=item.url||commentsUrl;
  const displayTitle=translation||item.title;
  return h('li',{className:`nx-item${isNew?' isnew':''}`},
    h('div',{className:'nx-rank'},rank),
    h('div',{className:'nx-vote-col'},
      h('button',{className:`nx-arr${voted?' v':''}`,onClick:()=>{if(!voted){setPts(p=>p+1);setVoted(true);}}},'▲'),
      h('span',{className:`nx-pts${voted?' v':''}`},pts)
    ),
    h('div',{className:'nx-body-col'},
      h('div',{className:'nx-title-row'},
        h('a',{className:'nx-ttl',href:articleHref,target:'_blank',rel:'noopener'},displayTitle),
        d&&h('span',{className:'nx-domain'},d),
        isNew&&h('span',{className:'nx-new-chip'},'new'),
        ...tags.map(t=>h(TagPill,{key:t,tag:t,active:false,onClick:onTagClick,dark}))
      ),
      h('div',{className:'nx-meta'},
        h('span',{className:'nx-meta-pts'},pts+' pts'),
        h('span',{className:'nx-meta-sep'},'·'),
        h('span',null,item.by),
        h('span',{className:'nx-meta-sep'},'·'),
        h('span',null,ago(item.time)),
        null
      )
    )
  );
}

function App(){
  const[tab,setTab]=useState('top');
  const[allIds,setAllIds]=useState([]);
  const[items,setItems]=useState([]);
  const[trans,setTrans]=useState({});
  const[loading,setLoading]=useState(true);
  const[loadingMore,setLoadingMore]=useState(false);
  const[translating,setTranslating]=useState(false);
  const[page,setPage]=useState(1);
  const[newIds,setNewIds]=useState(new Set());
  const[lastIds,setLastIds]=useState(new Set());
  const[cd,setCd]=useState(60);
  const[about,setAbout]=useState(false);
  const[dark,setDark]=useState(false);
  const[lang,setLang]=useState('es');
  const[showLangs,setShowLangs]=useState(false);
  const[activeFilters,setActiveFilters]=useState(new Set());
  const t1=useRef(),t2=useRef();
  const langRef=useRef();

  useEffect(()=>{
    function handler(e){if(langRef.current&&!langRef.current.contains(e.target))setShowLangs(false);}
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);

  const fetchIds=useCallback(async(t,prev)=>{
    const ids=await fetch(`${BASE}/${EP[t]}.json`).then(r=>r.json());
    setAllIds(ids);
    setNewIds(prev.size>0?new Set(ids.slice(0,PAGE).filter(id=>!prev.has(id))):new Set());
    setLastIds(new Set(ids.slice(0,PAGE)));
    return ids;
  },[]);

  const fetchPage=useCallback(async(ids,pageNum)=>{
    const slice=ids.slice((pageNum-1)*PAGE,pageNum*PAGE);
    const results=await Promise.all(slice.map(id=>fetch(`${BASE}/item/${id}.json`).then(r=>r.json())));
    return results.filter(Boolean);
  },[]);

  const doTranslate=useCallback(async(newItems,currentLang)=>{
    if(currentLang==='en'){setTrans({});return;}
    setTranslating(true);
    const cached={};
    const untranslated=[];
    newItems.forEach(i=>{
      const key=i.id+'_'+currentLang;
      if(trans[key])return;
      const stored=localStorage.getItem('nx_'+key);
      if(stored)cached[key]=stored;
      else untranslated.push(i);
    });
    if(Object.keys(cached).length)setTrans(prev=>({...prev,...cached}));
    if(!untranslated.length){setTranslating(false);return;}
    const titles=untranslated.map(i=>i.title);
    const translated=await translateBatch(titles,currentLang);
    if(translated){
      setTrans(prev=>{
        const next={...prev};
        untranslated.forEach((item,idx)=>{
          const key=item.id+'_'+currentLang;
          next[key]=translated[idx];
          try{localStorage.setItem('nx_'+key,translated[idx]);}catch(e){}
        });
        return next;
      });
    }
    setTranslating(false);
  },[trans]);

  useEffect(()=>{
    if(tab==='blog')return;
    setLoading(true);setItems([]);setTrans({});setAllIds([]);setNewIds(new Set());setPage(1);setActiveFilters(new Set());
    fetchIds(tab,new Set())
      .then(ids=>fetchPage(ids,1))
      .then(data=>{setItems(data);setLoading(false);return data;})
      .then(data=>doTranslate(data,lang))
      .catch(()=>setLoading(false));
    clearInterval(t1.current);clearInterval(t2.current);
    setCd(60);
    t1.current=setInterval(()=>{
      setCd(60);
      setLastIds(prev=>{
        fetchIds(tab,prev).then(ids=>fetchPage(ids,1)).then(data=>{setItems(data);setPage(1);doTranslate(data,lang);});
        return prev;
      });
    },60000);
    t2.current=setInterval(()=>setCd(c=>c<=1?60:c-1),1000);
    return()=>{clearInterval(t1.current);clearInterval(t2.current);};
  },[tab]);

  useEffect(()=>{
    if(!items.length)return;
    if(lang==='en'){setTrans({});return;}
    doTranslate(items,lang);
  },[lang]);

  const loadMore=useCallback(()=>{
    if(loadingMore)return;
    const nextPage=page+1;
    setLoadingMore(true);
    fetchPage(allIds,nextPage).then(data=>{
      setItems(prev=>[...prev,...data]);
      setPage(nextPage);
      setLoadingMore(false);
      if(lang!=='en')doTranslate(data,lang);
    }).catch(()=>setLoadingMore(false));
  },[allIds,page,loadingMore,fetchPage,lang,doTranslate]);

  const availableTags=useMemo(()=>{
    const counts={};
    items.forEach(item=>{getTags(item.title).forEach(t=>{counts[t]=(counts[t]||0)+1;});});
    return Object.entries(counts).filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]).map(([t,c])=>({tag:t,count:c}));
  },[items]);

  const filteredItems=useMemo(()=>{
    if(!activeFilters.size)return items;
    return items.filter(item=>[...activeFilters].every(f=>getTags(item.title).includes(f)));
  },[items,activeFilters]);

  const toggleFilter=useCallback(tag=>{
    setActiveFilters(prev=>{const n=new Set(prev);n.has(tag)?n.delete(tag):n.add(tag);return n;});
  },[]);

  const hasMore=allIds.length>page*PAGE;
  const skels=Array.from({length:PAGE},(_,i)=>i);
  const isES=lang!=='en';

  return h('div',{className:'nx','data-dark':dark?'1':undefined},

    h('div',{className:'nx-nav'},
      h('div',{className:'nx-logo',onClick:()=>window.open('https://nuxiens.org','_blank')},
        h('div',{className:'nx-logo-box'},h('span',{className:'nx-logo-n'},'N')),
        h('span',{className:'nx-logo-name'},'Nuxiens'),
        h('span',{className:'nx-logo-sep'},'·'),
        h('span',{className:'nx-logo-url'},'nuxiens.org')
      ),
      h('div',{className:'nx-nav-right'},
        h('div',{style:{position:'relative'},ref:langRef},
          h('button',{
            className:`nx-lang-btn${isES?' active':''}`,
            onClick:()=>setShowLangs(s=>!s)
          },
            isES&&h('span',{className:'nx-lang-dot'}),
            lang.toUpperCase(),
            ' ▾'
          ),
          showLangs&&h('div',{style:{
            position:'absolute',top:'calc(100% + 6px)',right:0,
            background:dark?'#1A1A1A':'#fff',
            border:`1px solid ${dark?'#2A2A2A':'#E5E5E5'}`,
            borderRadius:6,padding:'4px',zIndex:999,minWidth:80,
            boxShadow:'0 4px 16px rgba(0,0,0,.15)'
          }},
            LANGS.map(l=>h('button',{
              key:l.id,
              onClick:()=>{setLang(l.id);setShowLangs(false);},
              style:{
                display:'block',width:'100%',textAlign:'left',
                fontFamily:'var(--mono)',fontSize:10,
                padding:'6px 10px',border:'none',borderRadius:3,cursor:'pointer',
                background:lang===l.id?(dark?'#2A2A2A':'#F5F5F5'):'transparent',
                color:lang===l.id?'var(--accent)':'var(--text2)',
                transition:'all .1s',letterSpacing:'.3px'
              }
            },l.label,' ',h('span',{style:{opacity:.45,fontSize:9}},LANG_NAMES[l.id])))
          )
        ),
        h('button',{className:'nx-nav-btn',onClick:()=>setAbout(a=>!a)},about?'cerrar':'about'),
        h('button',{className:'nx-nav-btn nx-nav-donate',onClick:()=>window.open('https://nuxiens.org/donar','_blank')},'♥ donate'),
        h('button',{className:'nx-dark-btn',onClick:()=>setDark(d=>!d)},dark?'☀':'☾')
      )
    ),

    h('div',{className:'nx-subbar'},
      h('div',{className:'nx-tabs'},
        TABS.map(t=>h('button',{key:t.id,className:`nx-tab${tab===t.id?' on':''}`,onClick:()=>setTab(t.id)},t.label))
      ),
      h('div',{className:'nx-status-bar'},
        translating&&h('span',{className:'nx-trans-badge'},h('span',{className:'nx-spin'}),'translating…'),
        newIds.size>0&&h('span',{style:{color:'#22C55E'}},'+'+newIds.size+' new'),
        h('span',{className:'nx-pulse'}),
        h('span',null,loading?'loading...':'↻ '+fmtCd(cd))
      )
    ),

    about&&h('div',{className:'nx-about'},
      h('div',{className:'nx-about-text'},
        h('strong',null,'Nuxiens'),' es un agregador de noticias gratuito y de acceso abierto con miles de historias diarias en tecnología, inteligencia artificial, ciberseguridad, ciencia y negocios. La visión de ',h('a',{href:'https://nuxiens.org',target:'_blank',rel:'noopener',style:{color:'#1D4ED8',textDecoration:'none'}},'nuxiens.org'),' es poner al alcance de Latinoamérica la información que mueve al mundo — valorada por ingenieros, fundadores, revistas e investigadores de primer nivel.'
      ),
      h('button',{className:'nx-about-cta',onClick:()=>window.open('https://nuxiens.org/donar','_blank')},'♥ support the project')
    ),

    !loading&&availableTags.length>0&&h('div',{className:'nx-filter-bar'},
      h('span',{className:'nx-filter-label'},'filter'),
      ...availableTags.map(({tag,count})=>
        h('button',{key:tag,
          className:`nx-filter-chip${activeFilters.has(tag)?' on':''}`,
          style:activeFilters.has(tag)?{background:TAGS.find(t=>t.tag===tag)?.color,borderColor:'transparent'}:{},
          onClick:()=>toggleFilter(tag)},
          h(TagPill,{tag,active:activeFilters.has(tag),dark}),
          h('span',{className:'nx-chip-count'},count)
        )
      ),
      activeFilters.size>0&&h('button',{className:'nx-filter-clear',onClick:()=>setActiveFilters(new Set())},'clear ✕'),
      activeFilters.size>0&&h('span',{className:'nx-filter-result'},filteredItems.length+' result'+(filteredItems.length!==1?'s':''))
    ),

    tab==='blog'
      ?h('ul',{className:'nx-list'},
          POSTS.length===0
            ?h('div',{className:'nx-empty'},'No hay publicaciones aún.')
            :POSTS.map((p,i)=>h(BlogPost,{key:p.id,post:p,rank:i+1}))
        )
      :loading
      ?h('ul',{className:'nx-list'},skels.map(i=>
          h('li',{key:i,className:'nx-item'},
            h('div',{className:'nx-rank',style:{opacity:.2}},i+1),
            h('div',{className:'nx-vote-col'}),
            h('div',{className:'nx-body-col nx-sk'},
              h('div',{className:'nx-skb',style:{height:13,width:`${48+Math.random()*38}%`,marginBottom:7}}),
              h('div',{className:'nx-skb',style:{height:9,width:`${22+Math.random()*18}%`}})
            )
          )
        ))
      :h('div',null,
          filteredItems.length===0
            ?h('div',{className:'nx-empty'},'no stories match the selected filters')
            :h('ul',{className:'nx-list'},
                filteredItems.map((item,i)=>h(Row,{
                  key:item.id,item,rank:i+1,
                  isNew:newIds.has(item.id),
                  translation:lang!=='en'?trans[item.id+'_'+lang]:null,
                  onTagClick:toggleFilter,dark,lang
                }))
              ),
          !activeFilters.size&&hasMore&&h('div',{className:'nx-more-wrap'},
            h('button',{className:'nx-more-btn',disabled:loadingMore,onClick:loadMore},
              loadingMore?'loading...':'load more  ↓'
            ),
            h('div',{className:'nx-more-info'},'showing '+items.length+' of '+allIds.length)
          )
        ),

    h('div',{className:'nx-foot'},
      h('span',{className:'nx-foot-txt'},'auto-refresh 60s'+(items.length?' · '+items.length+' loaded':'')),
      h('span',{className:'nx-foot-txt'},'© 2025 nuxiens.org'),
      h('span',{className:'nx-foot-txt',style:{marginTop:4,display:'block',opacity:.6}},'Agradecemos sinceramente el apoyo de TNY Holdings, las comunidades tecnológicas de Latinoamérica y todos los colaboradores y lectores que hacen posible este proyecto.'),
      h('button',{className:'nx-foot-donate',onClick:()=>window.open('https://nuxiens.org/donar','_blank')},'♥ donar')
    )
  );
}
ReactDOM.createRoot(document.getElementById('nxroot')).render(h(App,null));
</script>
