<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuxiens · escritos</title>
<meta name="description" content="Escritos personales sobre tecnología, pensamiento e ideas. Cada lectura, lista para compartir.">
<meta property="og:title" content="Nuxiens · escritos">
<meta property="og:description" content="Escritos personales sobre tecnología, pensamiento e ideas. Cada lectura, lista para compartir.">
<meta property="og:image" content="https://nuxiens.org/og.svg">
<meta property="og:url" content="https://nuxiens.org">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Nuxiens · escritos">
<meta name="twitter:description" content="Escritos personales sobre tecnología, pensamiento e ideas.">
<meta name="twitter:image" content="https://nuxiens.org/og.svg">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23B31B1B'/%3E%3Ctext x='32' y='44' font-family='monospace' font-size='32' fill='white' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF8;--surface:#FFFFFF;--border:#E8E5DF;
  --text:#1A1816;--text2:#5C5750;--text3:#9B958C;
  --accent:#B31B1B;
  --serif:'Source Serif 4',Georgia,serif;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
[data-dark="1"]{
  --bg:#121110;--surface:#1A1816;--border:#2A2722;
  --text:#EDEAE4;--text2:#9B958C;--text3:#5C5750;
  --accent:#E0726B;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);transition:background .2s,color .2s}
a{color:inherit;text-decoration:none}
.nx-nav{display:flex;align-items:center;justify-content:space-between;max-width:760px;margin:0 auto;padding:28px 24px}
.nx-logo{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-weight:500;font-size:15px;letter-spacing:.2px}
.nx-logo span{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;background:var(--accent);color:#fff;font-size:13px}
.nx-toggle{border:1px solid var(--border);background:transparent;color:var(--text2);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.nx-toggle:hover{color:var(--text)}
.nx-hero{max-width:760px;margin:0 auto;padding:40px 24px 56px}
.nx-eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:18px}
.nx-hero h1{font-family:var(--serif);font-weight:500;font-size:42px;line-height:1.2;letter-spacing:-.5px;margin-bottom:16px}
.nx-hero p{font-family:var(--serif);font-size:18px;line-height:1.6;color:var(--text2);max-width:540px}
.nx-list{max-width:760px;margin:0 auto;padding:0 24px 100px;list-style:none}
.nx-entry{border-top:1px solid var(--border);padding:32px 0;cursor:pointer}
.nx-entry:last-child{border-bottom:1px solid var(--border)}
.nx-entry-date{font-family:var(--mono);font-size:12px;color:var(--text3);margin-bottom:10px}
.nx-entry h2{font-family:var(--serif);font-weight:500;font-size:25px;line-height:1.3;margin-bottom:10px;transition:color .15s}
.nx-entry:hover h2{color:var(--accent)}
.nx-entry p{font-family:var(--serif);font-size:16px;line-height:1.6;color:var(--text2)}
.nx-entry-more{display:inline-block;margin-top:14px;font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:.3px}
footer{max-width:760px;margin:0 auto;padding:32px 24px 60px;border-top:1px solid var(--border);font-family:var(--mono);font-size:12px;color:var(--text3);display:flex;justify-content:space-between}
.nx-reader-overlay{position:fixed;inset:0;background:var(--bg);z-index:50;overflow-y:auto;animation:nxfade .18s ease}
@keyframes nxfade{from{opacity:0}to{opacity:1}}
.nx-reader{max-width:680px;margin:0 auto;padding:32px 24px 100px}
.nx-back{display:inline-flex;align-items:center;gap:6px;border:none;background:transparent;color:var(--text2);font-family:var(--mono);font-size:13px;cursor:pointer;margin-bottom:36px}
.nx-back:hover{color:var(--text)}
.nx-reader-date{font-family:var(--mono);font-size:12px;color:var(--text3);margin-bottom:14px}
.nx-reader h1{font-family:var(--serif);font-weight:500;font-size:36px;line-height:1.25;letter-spacing:-.4px;margin-bottom:30px}
.nx-reader p{font-family:var(--serif);font-size:19px;line-height:1.75;color:var(--text);margin-bottom:22px}
.nx-share-btn{margin-top:30px;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--sans);font-weight:500;font-size:14px;padding:11px 18px;border-radius:9px;cursor:pointer}
.nx-share-btn:hover{border-color:var(--accent);color:var(--accent)}
.nx-studio-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;animation:nxfade .15s ease}
.nx-studio{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:880px;width:100%;max-height:90vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:0}
@media (max-width:720px){.nx-studio{grid-template-columns:1fr}}
.nx-studio-preview{background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
.nx-studio-preview canvas{width:100%;max-width:340px;border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.nx-studio-form{padding:28px}
.nx-studio-form h3{font-family:var(--serif);font-size:20px;margin-bottom:18px}
.nx-field{margin-bottom:16px}
.nx-field label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px}
.nx-field textarea,.nx-field input{width:100%;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;padding:10px 12px;border-radius:8px;resize:vertical}
.nx-swatches{display:flex;gap:8px;margin-bottom:16px}
.nx-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.nx-swatch.active{border-color:var(--text)}
.nx-bgrow{display:flex;gap:8px;margin-bottom:20px}
.nx-bgbtn{flex:1;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-family:var(--sans);font-size:13px;padding:9px;border-radius:8px;cursor:pointer}
.nx-bgbtn.active{border-color:var(--accent);color:var(--accent)}
.nx-studio-actions{display:flex;gap:10px}
.nx-studio-actions button{flex:1;border:none;font-family:var(--sans);font-weight:600;font-size:14px;padding:12px;border-radius:9px;cursor:pointer}
.nx-btn-primary{background:var(--accent);color:#fff}
.nx-btn-secondary{background:transparent;border:1px solid var(--border)!important;color:var(--text)}
.nx-close{position:absolute;top:14px;right:14px;border:none;background:transparent;color:var(--text2);font-size:20px;cursor:pointer;line-height:1}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script>
const{useState,useRef,useMemo,useEffect}=React;
const h=React.createElement;

const ENTRIES=[
  {
    id:1,
    title:'Bienvenida',
    date:'23 de junio, 2026',
    excerpt:'Nuxiens deja de ser un agregador de noticias y se convierte en un espacio personal de escritura — ideas, observaciones y reflexiones sobre tecnología y pensamiento.',
    body:`Durante un tiempo, Nuxiens fue un agregador: un lugar que recopilaba lo que otros escribían. Hoy cambia de naturaleza. Este espacio existe ahora para lo que yo mismo tengo que decir.

No hay aquí una promesa de frecuencia ni de tema fijo. Habrá tecnología, pero también habrá ideas que no caben en ninguna categoría — observaciones sobre cómo pensamos, cómo construimos, cómo decidimos.

Cada texto que publique aquí podrá convertirse en una imagen para compartir. La intención no es la viralidad, sino que una idea, si vale la pena, pueda viajar más allá de esta página.`,
    quote:'Este espacio existe ahora para lo que yo mismo tengo que decir.'
  }
];

function wrapText(ctx,text,x,y,maxW,lh,max){
  const words=text.split(' ');
  let line='',cy=y,lines=0;
  for(let i=0;i<words.length;i++){
    const test=line+words[i]+' ';
    if(ctx.measureText(test).width>maxW&&line){
      if(max&&lines>=max-1){
        ctx.fillText(line.trim()+'…',x,cy);
        return cy;
      }
      ctx.fillText(line.trim(),x,cy);
      line=words[i]+' ';cy+=lh;lines++;
    }else{
      line=test;
    }
  }
  if(line){ctx.fillText(line.trim(),x,cy);cy+=lh;}
  return cy;
}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

const PALETTE=['#B31B1B','#1D4ED8','#15803D','#7C3AED','#B45309','#0F766E'];

function renderQuoteImage(canvas,{quote,author,accent,dark}){
  const W=1080,H=1080,P=84;
  canvas.width=W;canvas.height=H;
  const c=canvas.getContext('2d');
  const bg=dark?'#121110':'#FAFAF8';
  const fg=dark?'#EDEAE4':'#1A1816';
  const fg2=dark?'rgba(237,234,228,0.5)':'rgba(26,24,22,0.5)';
  c.fillStyle=bg;c.fillRect(0,0,W,H);
  c.fillStyle=accent;c.fillRect(0,0,W,8);
  c.fillStyle=accent;c.font='italic 140px Georgia,serif';c.textAlign='left';
  c.fillText('“',P-14,300);
  c.fillStyle=fg;c.font='500 46px Georgia,serif';
  const endY=wrapText(c,quote,P,400,W-P*2,62,8);
  c.fillStyle=accent;c.font='italic 26px Georgia,serif';
  c.fillText(author||'Nuxiens',P,endY+70);
  c.strokeStyle=dark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.08)';c.lineWidth=1;
  c.beginPath();c.moveTo(P,H-110);c.lineTo(W-P,H-110);c.stroke();
  c.fillStyle=accent;rrect(c,P,H-86,28,28,7);c.fill();
  c.fillStyle='#fff';c.font='bold 14px monospace';c.textAlign='center';c.textBaseline='middle';
  c.fillText('N',P+14,H-86+15);
  c.textBaseline='alphabetic';c.textAlign='left';
  c.fillStyle=fg;c.font='600 18px Inter,sans-serif';c.fillText('Nuxiens',P+38,H-86+14);
  c.fillStyle=fg2;c.font='12px monospace';c.fillText('nuxiens.org',P+38,H-86+32);
}

function ShareStudio({entry,onClose}){
  const[quote,setQuote]=useState(entry.quote||entry.excerpt);
  const[author,setAuthor]=useState('Nuxiens');
  const[accent,setAccent]=useState(PALETTE[0]);
  const[imgDark,setImgDark]=useState(true);
  const canvasRef=useRef(null);

  useEffect(()=>{
    if(canvasRef.current)renderQuoteImage(canvasRef.current,{quote,author,accent,dark:imgDark});
  },[quote,author,accent,imgDark]);

  const getBlob=()=>new Promise(resolve=>canvasRef.current.toBlob(resolve,'image/png'));

  const download=async()=>{
    const blob=await getBlob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='nuxiens-'+entry.id+'.png';
    document.body.appendChild(a);a.click();a.remove();
    URL.revokeObjectURL(url);
  };

  const share=async()=>{
    const blob=await getBlob();
    const file=new File([blob],'nuxiens-'+entry.id+'.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file],title:entry.title,text:quote+'\n\nnuxiens.org'});
      }catch(e){}
    }else{
      download();
    }
  };

  return h('div',{className:'nx-studio-overlay',onClick:onClose},
    h('div',{className:'nx-studio',onClick:e=>e.stopPropagation()},
      h('button',{className:'nx-close',onClick:onClose},'×'),
      h('div',{className:'nx-studio-preview'},
        h('canvas',{ref:canvasRef})
      ),
      h('div',{className:'nx-studio-form'},
        h('h3',{},'Crear imagen'),
        h('div',{className:'nx-field'},
          h('label',{},'Cita o fragmento'),
          h('textarea',{rows:4,value:quote,onChange:e=>setQuote(e.target.value)})
        ),
        h('div',{className:'nx-field'},
          h('label',{},'Firma'),
          h('input',{value:author,onChange:e=>setAuthor(e.target.value)})
        ),
        h('div',{className:'nx-field'},
          h('label',{},'Color de acento'),
          h('div',{className:'nx-swatches'},
            PALETTE.map(p=>h('div',{
              key:p,
              className:'nx-swatch'+(accent===p?' active':''),
              style:{background:p},
              onClick:()=>setAccent(p)
            }))
          )
        ),
        h('div',{className:'nx-bgrow'},
          h('button',{className:'nx-bgbtn'+(imgDark?' active':''),onClick:()=>setImgDark(true)},'Oscuro'),
          h('button',{className:'nx-bgbtn'+(!imgDark?' active':''),onClick:()=>setImgDark(false)},'Claro')
        ),
        h('div',{className:'nx-studio-actions'},
          h('button',{className:'nx-btn-secondary',onClick:download},'Descargar'),
          h('button',{className:'nx-btn-primary',onClick:share},'Compartir')
        )
      )
    )
  );
}

function Reader({entry,onClose}){
  const paragraphs=entry.body.split('\n\n').filter(Boolean);
  const[studio,setStudio]=useState(false);
  return h('div',{className:'nx-reader-overlay'},
    studio&&h(ShareStudio,{entry,onClose:()=>setStudio(false)}),
    h('div',{className:'nx-reader'},
      h('button',{className:'nx-back',onClick:onClose},'← volver'),
      h('div',{className:'nx-reader-date'},entry.date),
      h('h1',{},entry.title),
      paragraphs.map((p,i)=>h('p',{key:i},p)),
      h('button',{className:'nx-share-btn',onClick:()=>setStudio(true)},'↗ Compartir como imagen')
    )
  );
}

function App(){
  const[dark,setDark]=useState(false);
  const[open,setOpen]=useState(null);

  useEffect(()=>{
    const saved=localStorage.getItem('nx-dark');
    if(saved==='1')setDark(true);
  },[]);
  useEffect(()=>{
    localStorage.setItem('nx-dark',dark?'1':'');
  },[dark]);

  const sorted=useMemo(()=>[...ENTRIES].sort((a,b)=>b.id-a.id),[]);

  return h('div',{'data-dark':dark?'1':undefined},
    h('nav',{className:'nx-nav'},
      h('div',{className:'nx-logo'},h('span',{},'N'),'Nuxiens'),
      h('button',{className:'nx-toggle',onClick:()=>setDark(!dark)},dark?'☀':'☾')
    ),
    h('div',{className:'nx-hero'},
      h('div',{className:'nx-eyebrow'},'escritos personales'),
      h('h1',{},'Ideas, sin agenda editorial.'),
      h('p',{},'Tecnología, pensamiento y todo lo que no cabe en una categoría. Cada lectura puede convertirse en una imagen para compartir.')
    ),
    h('ul',{className:'nx-list'},
      sorted.map(entry=>h('li',{key:entry.id,className:'nx-entry',onClick:()=>setOpen(entry)},
        h('div',{className:'nx-entry-date'},entry.date),
        h('h2',{},entry.title),
        h('p',{},entry.excerpt),
        h('span',{className:'nx-entry-more'},'leer →')
      ))
    ),
    h('footer',{},
      h('span',{},'nuxiens.org'),
      h('span',{},'© 2026')
    ),
    open&&h(Reader,{entry:open,onClose:()=>setOpen(null)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
